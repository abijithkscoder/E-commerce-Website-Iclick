services:
  - type: web
    name: ecommerce-backend
    runtime: python
    pythonVersion: 3.9
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: django-insecure-production-secret-key-change-this
      - key: CORS_ALLOWED_ORIGINS
        value: https://e-commerce-website-iclick.vercel.app,http://localhost:3000,http://localhost:5174
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,localhost,127.0.0.1"
